name: Build and Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.release.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Apply
        env:
          AB9C3E: ${{ secrets.AB9C3E }}
          BE55B7: ${{ secrets.BE55B7 }}
        run: |
          sudo chown -R "$(id -u):$(id -g)" ./_site
          python3 -c "
          import sys, pathlib, os
          meta_a = os.environ.get('AB9C3E', '')
          meta_b = os.environ.get('BE55B7', '')
          changed = 0
          for page in pathlib.Path('_site').rglob('*.html'):
              try:
                  src = page.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              out = src
              if meta_a:
                  out = out.replace('<!-- a37074a1e4e44b9dafffef0a0fb87605 -->', meta_a)
              if meta_b:
                  out = out.replace('<!-- decee276528eebe2c128cd26ee914fe016 -->', meta_b)
              if out != src:
                  page.write_text(out, encoding='utf-8')
                  changed += 1
          if changed == 0 and (meta_a or meta_b):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: release
        uses: actions/deploy-pages@v4
